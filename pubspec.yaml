name: naqde_user
description: A new Flutter application.
publish_to: 'none' #
version: 2.0.0+4

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0
  path_provider: ^2.1.5
  dotted_border: ^3.1.0
  flutter_contacts: ^1.1.9+2
  azlistview: ^2.0.0
  pin_code_fields: ^8.0.1
  modal_bottom_sheet: ^3.0.0
  slide_to_confirm: ^1.1.0
  lottie: ^3.3.2
  expandable_bottom_sheet: ^1.1.1+1
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.2.1
  country_code_picker: ^3.4.1
  camera: ^0.11.3
  google_mlkit_barcode_scanning: ^0.14.1
  google_mlkit_face_detection: ^0.13.1
  http: ^1.6.0
  carousel_slider: ^5.1.1
  flutter_svg: ^2.2.3
  flutter_html: ^3.0.0
  shimmer: ^3.0.0
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  screenshot: ^3.0.0
  gallery_saver_plus: ^3.2.9
  modal_progress_hud_nsn: ^0.5.1
  phone_numbers_parser: ^9.0.17
  local_auth: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^10.0.0
  app_settings: ^7.0.0
  percent_indicator: ^4.2.5
  flutter_smart_dialog: ^4.9.8+9
  device_info_plus: ^12.3.0
  unique_identifier: ^0.4.0
  url_launcher: ^6.3.2
  flutter_inappwebview: ^6.1.5
  scroll_to_index: ^3.0.1
  flutter_fgbg: ^0.7.1
  flutter_image_compress: ^2.4.0
  flutter_inappwebview_ios: ^1.1.2
  flutter_slidable: ^4.0.3
  syncfusion_flutter_datepicker: ^32.1.19
  skeletonizer: ^2.1.2
  open_file: ^3.5.10
  flutter_currency_input_formatter: ^1.0.1

  flutter_bloc: ^9.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_nfc_kit: ^3.3.1
  ndef: ^0.3.1
  http_parser: ^4.0.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/animationFile/
    - assets/payment/
    - assets/svg/


  fonts:
    - family: Rubik
      fonts:
        - asset: assets/font/Rubik-Light.ttf
          weight: 300
        - asset: assets/font/Rubik-Regular.ttf
          weight: 400
        - asset: assets/font/Rubik-Medium.ttf
          weight: 500
        - asset: assets/font/Rubik-SemiBold.ttf
          weight: 600
